# =============================================================================
# Unified SIL + HIL Nightly Test Pipeline — GitHub Actions
#
# Replaces the separate sil-nightly.yml and hil-test.yml workflows with a
# single pipeline that runs both tiers in parallel and produces a combined
# coverage report.
#
# Architecture:
#   Job 1: sil-tests  (ubuntu-latest, vcan0 + Docker)  — 18 SIL scenarios
#   Job 2: hil-tests  (self-hosted Pi, can0 + plant-sim) — 26 HIL scenarios
#   Job 3: combine-results (ubuntu-latest) — merge JUnit XML, coverage matrix
#
# Schedule:  Nightly at 02:00 UTC
# Manual:    workflow_dispatch with tier selection
#
# Standards:
#   ISO 26262 Part 6, Section 10 — Software Integration & Testing
#   ISO 26262 Part 4, Section 7 — HSI Verification
#   ASPICE SWE.5 / SWE.6 — SW Verification & Qualification Testing
#
# Traces: TSR-035, TSR-038, TSR-046, GAP-6
# =============================================================================

name: xIL Nightly Tests

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      tier:
        description: 'Which tiers to run'
        type: choice
        options:
          - both
          - sil-only
          - hil-only
        default: 'both'
      hil_channel:
        description: 'CAN channel for HIL'
        default: 'can0'
      hil_mqtt_host:
        description: 'MQTT broker for HIL fault injection'
        default: 'localhost'
      verbose:
        type: boolean
        default: false

env:
  CAN_CHANNEL: vcan0
  MQTT_HOST: localhost
  FAULT_PORT: 8091

jobs:
  # ===================================================================
  # Job 1: SIL Tests (GitHub-hosted runner, vcan0 + Docker)
  # ===================================================================
  sil-tests:
    name: SIL Integration Tests
    runs-on: ubuntu-latest
    if: inputs.tier != 'hil-only'
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            can-utils \
            iproute2 \
            cppcheck \
            linux-modules-extra-$(uname -r) || true

      - name: Set up vcan0 virtual CAN interface
        run: |
          sudo modprobe vcan
          sudo ip link add dev vcan0 type vcan
          sudo ip link set up vcan0
          ip -d link show vcan0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r test/sil/requirements.txt

      - name: Build Docker images
        run: docker compose -f docker/docker-compose.yml build
        env:
          DOCKER_BUILDKIT: 1

      - name: Run SIL test suite
        id: sil_run
        run: |
          chmod +x test/sil/run_sil.sh
          ./test/sil/run_sil.sh --timeout=${{ env.SIL_SCENARIO_TIMEOUT || '60' }} 2>&1 | tee sil_output.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          SIL_TIME_SCALE: "10"
        continue-on-error: true

      - name: Upload SIL test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sil-test-results
          path: |
            test/sil/results/
            sil_output.log
          retention-days: 90

      - name: Set job outcome
        if: always()
        run: |
          EXIT_CODE="${{ steps.sil_run.outputs.exit_code }}"
          if [ "$EXIT_CODE" = "0" ]; then
            echo "SIL tests passed."
          elif [ -z "$EXIT_CODE" ]; then
            echo "::error::SIL test runner did not produce an exit code."
            exit 1
          else
            echo "::error::SIL tests failed with exit code $EXIT_CODE."
            exit 1
          fi

  # ===================================================================
  # Job 2: HIL Tests (self-hosted Pi runner, can0 + plant-sim)
  # ===================================================================
  hil-tests:
    name: HIL Integration Tests
    runs-on: self-hosted
    if: inputs.tier != 'sil-only'
    timeout-minutes: 20
    continue-on-error: true  # Pi runner may be offline for nightly

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r test/hil/requirements.txt

      - name: Verify CAN interface
        run: |
          CHANNEL="${{ inputs.hil_channel || 'can0' }}"
          echo "Checking CAN interface: $CHANNEL"
          if ! ip link show "$CHANNEL" 2>/dev/null | grep -q "UP"; then
            echo "::error::CAN interface $CHANNEL is not UP."
            exit 1
          fi
          echo "$CHANNEL is UP"
          ip -d link show "$CHANNEL"

      - name: Verify plant-sim is running
        run: |
          CHANNEL="${{ inputs.hil_channel || 'can0' }}"
          timeout 5 candump "$CHANNEL" -n 1 -T 5000 2>/dev/null || {
            echo "::warning::No CAN traffic detected. Plant-sim may not be running."
          }

      - name: Run HIL test suite
        id: hil_run
        run: |
          CHANNEL="${{ inputs.hil_channel || 'can0' }}"
          MQTT="${{ inputs.hil_mqtt_host || 'localhost' }}"
          ARGS="--channel $CHANNEL --interface socketcan --mqtt-host $MQTT"

          if [ "${{ inputs.verbose }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi

          echo "Running: python3 test/hil/hil_runner.py $ARGS"
          python3 test/hil/hil_runner.py $ARGS 2>&1 | tee hil_output.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload HIL test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hil-test-results
          path: |
            test/hil/results/
            hil_output.log
          retention-days: 90

      - name: Set job outcome
        if: always()
        run: |
          EXIT_CODE="${{ steps.hil_run.outputs.exit_code }}"
          if [ "$EXIT_CODE" = "0" ]; then
            echo "HIL tests passed."
          elif [ -z "$EXIT_CODE" ]; then
            echo "::error::HIL test runner did not produce an exit code."
            exit 1
          else
            echo "::error::HIL tests failed with exit code $EXIT_CODE."
            exit 1
          fi

  # ===================================================================
  # Job 3: Combine Results — merge JUnit XML, coverage matrix, gate
  # ===================================================================
  combine-results:
    name: Combined xIL Report
    runs-on: ubuntu-latest
    needs: [sil-tests, hil-tests]
    if: always()
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml junit-xml

      - name: Download SIL results
        uses: actions/download-artifact@v4
        if: needs.sil-tests.result != 'skipped'
        with:
          name: sil-test-results
          path: sil-test-results/
        continue-on-error: true

      - name: Download HIL results
        uses: actions/download-artifact@v4
        if: needs.hil-tests.result != 'skipped'
        with:
          name: hil-test-results
          path: hil-test-results/
        continue-on-error: true

      - name: Run xIL results merger
        id: merge
        run: |
          python tools/ci/merge_xil_results.py \
            --sil-results sil-test-results/ \
            --hil-results hil-test-results/ \
            --sil-scenarios test/sil/scenarios/ \
            --hil-scenarios test/hil/scenarios/ \
            --output combined-results/ \
            --sil-status "${{ needs.sil-tests.result }}" \
            --hil-status "${{ needs.hil-tests.result }}"

      - name: Upload combined results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xil-combined-results
          path: combined-results/
          retention-days: 90

      - name: Post combined summary
        if: always()
        run: |
          if [ -f combined-results/summary.txt ]; then
            cat combined-results/summary.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::No combined summary produced."
            echo "## xIL Nightly — No Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "The merge script did not produce a summary file." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Gate — fail if any completed tier failed
        if: always()
        run: |
          SIL="${{ needs.sil-tests.result }}"
          HIL="${{ needs.hil-tests.result }}"

          echo "SIL status: $SIL"
          echo "HIL status: $HIL"

          FAILED=false

          if [ "$SIL" = "failure" ]; then
            echo "::error::SIL tests failed."
            FAILED=true
          fi

          if [ "$HIL" = "failure" ]; then
            echo "::error::HIL tests failed."
            FAILED=true
          fi

          if [ "$SIL" = "skipped" ] && [ "$HIL" = "skipped" ]; then
            echo "::error::Both tiers were skipped — nothing ran."
            FAILED=true
          fi

          if [ "$FAILED" = "true" ]; then
            exit 1
          fi

          echo "All completed tiers passed."
