name: "Vehicle State Machine — Boot to RUN"
id: "HIL-007"
description: >
  Observes the vehicle state machine from boot and verifies it reaches
  RUN.  With the Safety Controller (TMS570) on the bus and relay readback
  disabled on bench, the SC energizes the relay and all ECUs transition
  through INIT to RUN.  Also confirms the Vehicle_State frame (0x100)
  and SC_Status heartbeat (0x013) are present on the bus.
verifies:
  - "TSR-005"
  - "SSR-CVC-016"
asil: "D"
aspice: "SWE.6"
iso_reference: "ISO 26262 Part 4, Section 7"
timeout_sec: 30
requires_mqtt: false

setup: []

steps:
  - action: wait
    seconds: 5
    description: "Observe state machine from boot"

verdicts:
  - type: vehicle_state
    expected: RUN
    within_ms: 10000
    description: "Vehicle state reaches RUN (SC relay energized)"
  - type: can_message
    can_id: 0x100
    description: "Vehicle_State frame present on the bus"
  - type: can_message
    can_id: 0x013
    description: "SC_Status heartbeat present on the bus"

teardown:
  - action: reset
    description: "Reset to idle"
