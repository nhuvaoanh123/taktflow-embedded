# =============================================================================
# @file    sil_018_gateway_sap_qm.yaml
# @brief   SIL scenario: Gateway SAP QM DTC forwarding and 8D report generation
# @aspice  SWE.5 — Software Component Verification & Integration
# @date    2026-02-25
#
# Validates that the gateway forwards DTC events to the SAP QM mock API
# and generates an 8D report template upon receiving a Q-Meldung number.
#
# Data flow:
#   ECU DTC → CAN 0x500 → can-gateway decodes → MQTT taktflow/alerts/dtc/0xXXXX
#   → sap-qm-mock DTCConnector subscribes → creates OData notification
#   → generates 8D report → publishes taktflow/sap/notification
# =============================================================================

name: "Gateway SAP QM DTC Forwarding"
id: "SIL-018"
description: >
  Verify that when a DTC is raised (via overcurrent fault), the gateway
  forwards the event via MQTT to the SAP QM mock DTCConnector, which
  creates an OData quality notification and generates an 8D report template.
verifies:
  - "SWR-GW-005"   # SAP QM DTC Forwarding
  - "SWR-GW-006"   # 8D Report Template Generation
aspice: "SWE.5"
iso_reference: "ISO 26262 Part 6, Section 10"
timeout_sec: 90

setup:
  - action: reset
    description: "Clear residual state and previous reports"
  - action: wait
    seconds: 5
    description: "Allow all containers and SAP QM mock API to initialize"

steps:
  - action: wait_state
    state: RUN
    timeout: 15
    description: "Wait for INIT hold (10s) + E2E stabilization"
  - action: inject_fault
    type: overcurrent
    value: 22.0
    description: "Inject overcurrent to trigger DTC (Dem records DTC 0x110001)"
  - action: wait
    seconds: 5
    description: "Wait for DTC to propagate via CAN to gateway"
  - action: wait
    seconds: 3
    description: "Wait for gateway to forward DTC to SAP QM mock and generate report"

verdicts:
  - type: mqtt_message
    topic: "vehicle/dtc/new"
    description: "Gateway publishes DTC event to vehicle/dtc/new MQTT topic"

  - type: http_request
    url: "http://localhost:8090/sap/opu/odata/sap/API_QUALITYNOTIFICATION/QualityNotification"
    method: GET
    expected_status: 200
    description: "SAP QM mock API reachable and has processed notifications via DTCConnector"

  - type: mqtt_message
    topic: "taktflow/sap/notification"
    field: "event"
    expected: "notification_created"
    description: "DTCConnector publishes notification_created event after creating 8D report"

teardown:
  - action: reset
    description: "Return system to clean idle state"
