# Mosquitto MQTT Broker — SIL stack (port 1884)
# Runs alongside HIL broker (port 1883) on the Pi.

listener 1884 0.0.0.0
protocol mqtt

listener 9002 0.0.0.0
protocol websockets

allow_anonymous true

persistence false

log_dest stdout
log_type error
log_type warning
log_type notice
connection_messages true
